<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#0b1220" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Ad-free, radar-focused weather with animated nowcast and long-range outlook."
    />
    <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>Nimbus — Radar Weather</title>
  </head>
  <body>
    <div id="app">
      <!-- Full-screen radar map -->
      <div id="map" aria-label="Weather radar map"></div>

      <!-- Top bar: location + search -->
      <header id="topbar">
        <button id="locateBtn" class="icon-btn" title="Use my location" aria-label="Use my location">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 8a4 4 0 100 8 4 4 0 000-8zm8.94 3A9 9 0 0013 3.06V1h-2v2.06A9 9 0 003.06 11H1v2h2.06A9 9 0 0011 20.94V23h2v-2.06A9 9 0 0020.94 13H23v-2h-2.06zM12 19a7 7 0 110-14 7 7 0 010 14z"/></svg>
        </button>
        <div id="searchWrap">
          <input
            id="searchInput"
            type="search"
            placeholder="Search a place…"
            autocomplete="off"
            aria-label="Search for a place"
          />
          <ul id="searchResults" role="listbox" hidden></ul>
        </div>
        <button id="savedBtn" class="icon-btn" title="Saved locations" aria-label="Saved locations">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M17 3H7a2 2 0 00-2 2v16l7-3 7 3V5a2 2 0 00-2-2z"/></svg>
        </button>
      </header>

      <!-- Radar timeline controls -->
      <div id="radarControls" aria-label="Radar animation controls">
        <button id="playBtn" class="icon-btn play" title="Play / pause radar" aria-label="Play or pause radar">
          <svg id="playIcon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" hidden><path fill="currentColor" d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
        </button>
        <div id="timelineWrap">
          <input id="timeline" type="range" min="0" max="0" value="0" step="1" aria-label="Radar frame" />
          <div id="timeLabel"><span id="timeText">—</span><span id="nowcastBadge" hidden>FORECAST</span></div>
        </div>
      </div>

      <!-- Sliding forecast panel -->
      <section id="panel" aria-label="Forecast">
        <div id="panelHandle" role="button" tabindex="0" aria-label="Expand or collapse forecast">
          <div class="grip"></div>
        </div>

        <div id="nowBlock">
          <div id="nowMain">
            <span id="nowTemp">—</span>
            <div id="nowMeta">
              <div id="nowPlace">Locating…</div>
              <div id="nowDesc">—</div>
            </div>
          </div>
          <div id="nowStats"></div>
        </div>

        <!-- Tier tabs -->
        <nav id="tierTabs" role="tablist">
          <button class="tier-tab active" data-tier="hourly" role="tab">Hourly</button>
          <button class="tier-tab" data-tier="daily" role="tab">16-Day</button>
          <button class="tier-tab" data-tier="outlook" role="tab">Outlook</button>
        </nav>

        <div id="tierBody">
          <div class="tier-view" data-tier="hourly"><div id="hourlyStrip" class="strip"></div></div>
          <div class="tier-view" data-tier="daily" hidden><div id="dailyList"></div></div>
          <div class="tier-view" data-tier="outlook" hidden>
            <p id="outlookIntro" class="hint"></p>
            <div id="outlookBody"></div>
          </div>
        </div>
      </section>

      <div id="toast" role="status" aria-live="polite" hidden></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
